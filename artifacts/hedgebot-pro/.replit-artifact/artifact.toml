kind = "web"
previewPath = "/"
title = "HedgeBot Pro"
version = "1.0.0"
id = "artifacts/hedgebot-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22762

[services.development]
run = "pnpm --filter @workspace/hedgebot-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hedgebot-pro", "run", "build" ]
publicDir = "artifacts/hedgebot-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22762"
BASE_PATH = "/"
